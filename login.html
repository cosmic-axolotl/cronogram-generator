<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OVL Cronogramas — Acesso do Professor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700;800&family=Exo+2:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05080f;--text:#dce8f5;--muted:#7a9bbf;--dim:#2e4a6a;
  --accent:#6aabf0;--orange:#e8934a;
  --border:rgba(100,155,220,.15);--border2:rgba(100,155,220,.35);
  --panel:rgba(8,14,28,.85);
}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;}
/* stars */
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.s{position:absolute;border-radius:50%;background:#fff;
   animation:tw var(--d,3s) var(--dl,0s) infinite ease-in-out}
@keyframes tw{0%,100%{opacity:var(--mn,.1)}50%{opacity:var(--mx,.8)}}

.card{position:relative;z-index:2;background:var(--panel);border:.5px solid var(--border2);
  border-radius:20px;padding:40px 44px;width:100%;max-width:420px;
  backdrop-filter:blur(20px);}

.logo-wrap{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px}
.logo-wrap img{height:38px;width:auto}
.inst-name{font-family:'Urbanist',sans-serif;font-size:13px;font-weight:700;color:var(--muted);text-align:center}

h1{font-family:'Urbanist',sans-serif;font-size:22px;font-weight:800;color:#dff0ff;
  text-align:center;margin:20px 0 4px;letter-spacing:-.02em}
.subtitle{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px}

/* tabs */
.tabs{display:flex;gap:4px;background:rgba(8,14,28,.6);border-radius:10px;padding:4px;margin-bottom:24px}
.tab{flex:1;padding:8px;border-radius:7px;border:none;font-family:'Exo 2',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--muted);
  transition:all .2s}
.tab.active{background:rgba(106,171,240,.15);color:var(--accent)}

.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);
  text-transform:uppercase;letter-spacing:.07em}
.field input{background:rgba(8,14,28,.9);border:.5px solid var(--border2);color:var(--text);
  border-radius:8px;padding:11px 14px;font-family:'Exo 2',sans-serif;font-size:14px;
  outline:none;transition:border-color .2s,box-shadow .2s}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(106,171,240,.12)}

.btn{width:100%;padding:12px;border-radius:8px;border:none;font-family:'Exo 2',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:4px}
.btn-primary{background:var(--accent);color:#05080f;box-shadow:0 2px 16px rgba(106,171,240,.3)}
.btn-primary:hover{opacity:.88;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}

.msg{padding:10px 14px;border-radius:8px;font-size:13px;text-align:center;margin-top:12px;display:none}
.msg.err{background:rgba(255,85,85,.1);border:.5px solid rgba(255,85,85,.3);color:#ff7070;display:block}
.msg.ok{background:rgba(80,227,164,.1);border:.5px solid rgba(80,227,164,.3);color:#50e3a4;display:block}

.buscar-link{text-align:center;margin-top:20px}
.buscar-link a{font-size:12px;color:var(--muted);text-decoration:none;
  font-family:'JetBrains Mono',monospace;transition:color .2s}
.buscar-link a:hover{color:var(--accent)}

footer{position:relative;z-index:2;margin-top:28px;text-align:center;
  font-size:11px;color:var(--dim);font-family:'Exo 2',sans-serif}
</style>
</head>
<body>

<div id="stars"></div>

<div class="card">
  <div class="logo-wrap">
    <span style="font-size:22px">🔭</span>
  </div>
  <div class="inst-name">Observatório do Valongo · UFRJ</div>
  <h1>Área do Professor</h1>
  <p class="subtitle">Gerencie os cronogramas das suas disciplinas</p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Entrar</button>
    <button class="tab" onclick="switchTab('register')">Criar conta</button>
  </div>

  <!-- LOGIN -->
  <div id="tab-login">
    <div class="field">
      <label>E-mail</label>
      <input type="email" id="l-email" placeholder="seu@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="l-senha" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" id="btn-login" onclick="doLogin()">Entrar</button>
    <div class="msg" id="msg-login"></div>
  </div>

  <!-- REGISTRO -->
  <div id="tab-register" style="display:none">
    <div class="field">
      <label>Nome completo</label>
      <input type="text" id="r-nome" placeholder="Prof. Nome Sobrenome">
    </div>
    <div class="field">
      <label>E-mail</label>
      <input type="email" id="r-email" placeholder="seu@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Senha (mín. 6 caracteres)</label>
      <input type="password" id="r-senha" placeholder="••••••••" autocomplete="new-password">
    </div>
    <button class="btn btn-primary" id="btn-reg" onclick="doRegister()">Criar conta</button>
    <div class="msg" id="msg-reg"></div>
  </div>

  <div class="buscar-link">
    <a href="buscar.html">→ Buscar cronogramas publicados (acesso público)</a>
  </div>
</div>

<footer>⭐ OVL Cronogramas · Observatório do Valongo · UFRJ ⭐</footer>

<script src="_shared.js"></script>
<script>
'use strict';

// Se já logado, redirecionar direto para o painel
if (getToken()) window.location.href = 'painel.html';

// Stars
(function() {
  var l = document.getElementById('stars');
  for (var i = 0; i < 60; i++) {
    var s = document.createElement('div'); s.className = 's';
    var sz = Math.random() * 2 + .5;
    s.style.cssText = 'left:'+(Math.random()*100)+'%;top:'+(Math.random()*100)+'%;'
      +'width:'+sz+'px;height:'+sz+'px;--d:'+(2+Math.random()*4)+'s;'
      +'--dl:'+(Math.random()*5)+'s;--mn:'+(0.05+Math.random()*.15).toFixed(2)
      +';--mx:'+(0.4+Math.random()*.5).toFixed(2)+';';
    l.appendChild(s);
  }
})();

function switchTab(tab) {
  var isLogin = tab === 'login';
  document.getElementById('tab-login').style.display    = isLogin ? 'block' : 'none';
  document.getElementById('tab-register').style.display = isLogin ? 'none'  : 'block';
  document.querySelectorAll('.tab').forEach(function(b, i) {
    b.classList.toggle('active', isLogin ? i === 0 : i === 1);
  });
}

function showMsg(id, text, type) {
  var el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type;
}

async function doLogin() {
  var email = document.getElementById('l-email').value.trim();
  var senha = document.getElementById('l-senha').value;
  if (!email || !senha) { showMsg('msg-login', 'Preencha e-mail e senha.', 'err'); return; }

  var btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Entrando...';

  var body = new URLSearchParams({ username: email, password: senha });
  var res = await fetch(API + '/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: body.toString()
  });
  var data = await res.json();

  if (!res.ok) {
    showMsg('msg-login', data.detail || 'Erro ao entrar.', 'err');
    btn.disabled = false; btn.textContent = 'Entrar';
    return;
  }

  setAuth(data.access_token, data.professor);
  window.location.href = 'painel.html';
}

async function doRegister() {
  var nome  = document.getElementById('r-nome').value.trim();
  var email = document.getElementById('r-email').value.trim();
  var senha = document.getElementById('r-senha').value;

  if (!nome || !email || !senha) { showMsg('msg-reg', 'Preencha todos os campos.', 'err'); return; }
  if (senha.length < 6) { showMsg('msg-reg', 'Senha deve ter ao menos 6 caracteres.', 'err'); return; }

  var btn = document.getElementById('btn-reg');
  btn.disabled = true; btn.textContent = 'Criando conta...';

  var res = await apiFetch('/auth/register', {
    method: 'POST',
    body: JSON.stringify({ name: nome, email: email, password: senha })
  });
  var data = await res.json();

  if (!res.ok) {
    showMsg('msg-reg', data.detail || 'Erro ao criar conta.', 'err');
    btn.disabled = false; btn.textContent = 'Criar conta';
    return;
  }

  showMsg('msg-reg', 'Conta criada! Entrando...', 'ok');

  // Auto-login após registro
  var loginBody = new URLSearchParams({ username: email, password: senha });
  var loginRes = await fetch(API + '/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: loginBody.toString()
  });
  var loginData = await loginRes.json();
  if (loginRes.ok) {
    setAuth(loginData.access_token, loginData.professor);
    window.location.href = 'painel.html';
  }
}

// Enter para submeter
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  var active = document.getElementById('tab-login').style.display !== 'none';
  if (active) doLogin(); else doRegister();
});
</script>
</body>
</html>
